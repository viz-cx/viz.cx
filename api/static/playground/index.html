<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIZ.cx API Playground</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>VIZ.cx API Playground</h1>
      <p>Explore the VIZ blockchain indexer API interactively</p>
    </header>

    <main>
      <section class="sidebar">
        <h2>Endpoints</h2>
        <div id="endpoint-list"></div>
      </section>

      <section class="main-content">
        <div id="request-form"></div>
        <div id="response-panel"></div>
      </section>

      <section class="ws-panel">
        <h2>WebSocket Stream (/ws/ops)</h2>
        <div id="ws-controls"></div>
        <div id="ws-output"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
